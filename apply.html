<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | Aegis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #16a34a; --bg: #f8fafc; --text: #334155;}
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding: 40px;}
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; max-width: 600px; margin: 0 auto; }
        h2 { color: var(--primary); text-align: center; font-size: 2em; margin-bottom: 20px; margin-top: 0;}
        p { text-align: center; color: var(--text); margin-bottom: 30px;}
        label { display: block; font-weight: 500; margin-bottom: 5px; color: var(--primary); margin-top: 15px;}
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-green-solid { background: var(--accent); color: white; border: none; padding: 15px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 30px; width: 100%; font-size: 1.1em;}
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="card">
        <h2>Personnel Self-Application</h2>
        <p>Submit your credentials for administrative review and join our elite team.</p>
        <form id="applyForm">
            <label>Full Name</label>
            <input type="text" id="name" required>
            <label>License Number</label>
            <input type="text" id="license" required>
            <label>Email Address</label>
            <input type="email" id="email" required>
            <label>License Expiration Date</label>
            <input type="date" id="exp_date" required>
            <button type="submit" class="btn-green-solid">Submit Application</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://tojcimhuslpbpkmkvvsz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvamNpbWh1c2xwYnBrbWt2dnN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDg0MDcsImV4cCI6MjA4ODY4NDQwN30.rmatxYCKks8CKhdtesRwrITx06he4-AjgmLhlsEFzxo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                license_number: document.getElementById('license').value,
                email: document.getElementById('email').value,
                expiration_date: document.getElementById('exp_date').value,
                status: 'pending' 
            };

            const { error } = await supabaseClient.from('guards').insert([payload]);
            if (error) alert("Error: " + error.message);
            else {
                alert("Application submitted successfully! Pending admin approval.");
                document.getElementById('applyForm').reset();
            }
        });
    </script>
</body>
</html>
