<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --text: #334155; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 15px 40px; display: flex; justify-content: space-between; }
        .logo { font-size: 1.5em; font-weight: bold; }
        
        /* Login Screen */
        #login-screen { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;}
        button { cursor: pointer; padding: 10px 15px; border-radius: 4px; border: none; font-weight: bold; color: white;}
        .btn-login { background: var(--accent); width: 100%; }
        
        /* Dashboard Screen */
        #dashboard-screen { display: none; max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .section-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        
        .grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .card { background: var(--bg); padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .card h3 { margin: 0 0 10px 0; }
        
        /* Action Buttons */
        .btn-accept { background: var(--success); }
        .btn-reject, .btn-revoke { background: var(--danger); }
        .btn-edit { background: var(--primary); }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Aegis Admin</div>
        <a href="index.html" style="color: white; text-decoration: none; margin-top: 5px;">Back to Portal</a>
    </header>

    <div id="login-screen">
        <h2>System Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-login" onclick="login()">Enter Dashboard</button>
        <p id="error-msg" style="color: red; display: none; font-size: 0.9em;">Access Denied.</p>
    </div>

    <div id="dashboard-screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Management Console</h2>
            <button style="background: #64748b;" onclick="location.reload()">Log Out</button>
        </div>

        <div class="section-box">
            <h3>Pending Applications (Needs Review)</h3>
            <div id="pending-list" class="grid">Loading...</div>
        </div>

        <div class="section-box" style="border-top-color: var(--success);">
            <h3>Active Guard Roster</h3>
            <div id="active-list" class="grid">Loading...</div>
        </div>
    </div>

    <script>
        // --- LOGIN ---
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === 'admin' && p === 'security2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                fetchData();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // --- DATABASE SETUP ---
        const SUPABASE_URL = 'https://tojcimhuslpbpkmkvvsz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvamNpbWh1c2xwYnBrbWt2dnN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDg0MDcsImV4cCI6MjA4ODY4NDQwN30.rmatxYCKks8CKhdtesRwrITx06he4-AjgmLhlsEFzxo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- FETCH & RENDER DATA ---
        async function fetchData() {
            const { data, error } = await supabaseClient.from('guards').select('*');
            if (error) { alert("Error fetching data!"); return; }

            const pendingDiv = document.getElementById('pending-list');
            const activeDiv = document.getElementById('active-list');
            pendingDiv.innerHTML = ''; activeDiv.innerHTML = '';

            let hasPending = false; let hasActive = false;

            data.forEach(g => {
                const cardHtml = `
                    <div class="card">
                        <h3>${g.name}</h3>
                        <p><strong>License:</strong> ${g.license_number}</p>
                        <p><strong>Email:</strong> ${g.email}</p>
                        <p><strong>Expires:</strong> ${g.expiration_date}</p>
                        <div class="actions">
                            ${g.status === 'pending' ? `
                                <button class="btn-accept" onclick="updateStatus(${g.id}, 'approved')">Accept</button>
                                <button class="btn-reject" onclick="deleteRecord(${g.id})">Reject</button>
                            ` : `
                                <button class="btn-edit" onclick="editRecord(${g.id}, '${g.name}', '${g.expiration_date}')">Edit</button>
                                <button class="btn-revoke" onclick="deleteRecord(${g.id})">Revoke</button>
                            `}
                        </div>
                    </div>
                `;

                if (g.status === 'pending') { pendingDiv.innerHTML += cardHtml; hasPending = true; } 
                else { activeDiv.innerHTML += cardHtml; hasActive = true; }
            });

            if (!hasPending) pendingDiv.innerHTML = "<p>No pending applications.</p>";
            if (!hasActive) activeDiv.innerHTML = "<p>No active guards.</p>";
        }

        // --- ADMIN ACTIONS ---
        async function updateStatus(id, newStatus) {
            await supabaseClient.from('guards').update({ status: newStatus }).eq('id', id);
            fetchData();
        }

        async function deleteRecord(id) {
            if(confirm("Are you sure you want to permanently delete this record?")) {
                await supabaseClient.from('guards').delete().eq('id', id);
                fetchData();
            }
        }

        async function editRecord(id, currentName, currentDate) {
            // Using built-in browser prompts for quick editing
            const newName = prompt("Edit Name:", currentName);
            if (newName === null) return; // Cancelled
            
            const newDate = prompt("Edit Expiration Date (YYYY-MM-DD):", currentDate);
            if (newDate === null) return;

            const { error } = await supabaseClient.from('guards').update({ 
                name: newName, 
                expiration_date: newDate 
            }).eq('id', id);

            if (error) alert("Error updating record.");
            else fetchData();
        }
    </script>
</body>
</html>
