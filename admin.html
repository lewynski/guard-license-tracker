<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Aegis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #16a34a; 
            --bg: #f8fafc; 
            --text: #334155; 
            --success: #16a34a; /* Matched to new accent green */
            --danger: #ef4444; 
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        header { background: #fff; color: var(--primary); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 1.5em; font-weight: bold; }
        .logo span { color: var(--accent); }
        
        /* Login Screen */
        #login-screen { max-width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        #login-screen h2 { color: var(--primary); margin-top: 0; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-family: 'Inter'; }
        button { cursor: pointer; padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; color: white; font-family: 'Inter'; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-login { background: var(--accent); width: 100%; padding: 12px; font-size: 1.1em; }
        
        /* Dashboard Screen */
        #dashboard-screen { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .dashboard-header h2 { color: var(--primary); margin: 0; font-size: 2em; }
        
        .section-box { background: white; padding: 30px; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; border-top: 4px solid var(--primary); }
        .section-box.active-box { border-top-color: var(--success); }
        .section-box h3 { margin-top: 0; color: var(--primary); font-size: 1.5em; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .card { background: var(--bg); padding: 20px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .card h3 { margin: 0 0 15px 0; color: var(--primary); border: none; padding: 0; font-size: 1.2em; }
        .card p { margin: 8px 0; font-size: 0.95em; }
        
        /* Action Buttons */
        .btn-accept { background: var(--success); }
        .btn-reject, .btn-revoke { background: var(--danger); }
        .btn-edit { background: var(--primary); }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .actions button { flex: 1; padding: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Aegis <span>Admin</span></div>
        <a href="index.html" style="color: var(--text); text-decoration: none; font-weight: 500;">← Back to Website</a>
    </header>

    <div id="login-screen">
        <h2>System Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-login" onclick="login()">Enter Dashboard</button>
        <p id="error-msg" style="color: var(--danger); display: none; font-size: 0.9em; margin-top: 15px; font-weight: 500;">Access Denied. Invalid credentials.</p>
    </div>

    <div id="dashboard-screen">
        <div class="dashboard-header">
            <h2>Management Console</h2>
            <button style="background: var(--primary); padding: 10px 20px;" onclick="location.reload()">Log Out</button>
        </div>

        <div class="section-box">
            <h3>Pending Applications (Needs Review)</h3>
            <div id="pending-list" class="grid">Loading...</div>
        </div>

        <div class="section-box active-box">
            <h3>Active Guard Roster</h3>
            <div id="active-list" class="grid">Loading...</div>
        </div>
    </div>

    <script>
        // --- LOGIN ---
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === 'admin' && p === 'security2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                fetchData();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // --- DATABASE SETUP ---
        const SUPABASE_URL = 'https://tojcimhuslpbpkmkvvsz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvamNpbWh1c2xwYnBrbWt2dnN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDg0MDcsImV4cCI6MjA4ODY4NDQwN30.rmatxYCKks8CKhdtesRwrITx06he4-AjgmLhlsEFzxo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- FETCH & RENDER DATA ---
        async function fetchData() {
            const { data, error } = await supabaseClient.from('guards').select('*');
            if (error) { alert("Error fetching data!"); return; }

            const pendingDiv = document.getElementById('pending-list');
            const activeDiv = document.getElementById('active-list');
            pendingDiv.innerHTML = ''; activeDiv.innerHTML = '';

            let hasPending = false; let hasActive = false;

            // Sort data so newest applications appear first
            data.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

            data.forEach(g => {
                const cardHtml = `
                    <div class="card">
                        <h3>${g.name}</h3>
                        <p><strong>License:</strong> ${g.license_number}</p>
                        <p><strong>Email:</strong> ${g.email}</p>
                        <p><strong>Expires:</strong> ${g.expiration_date}</p>
                        <div class="actions">
                            ${g.status === 'pending' ? `
                                <button class="btn-accept" onclick="updateStatus(${g.id}, 'approved')">Accept</button>
                                <button class="btn-reject" onclick="deleteRecord(${g.id})">Reject</button>
                            ` : `
                                <button class="btn-edit" onclick="editRecord(${g.id}, '${g.name}', '${g.expiration_date}')">Edit</button>
                                <button class="btn-revoke" onclick="deleteRecord(${g.id})">Revoke</button>
                            `}
                        </div>
                    </div>
                `;

                if (g.status === 'pending') { pendingDiv.innerHTML += cardHtml; hasPending = true; } 
                else if (g.status === 'approved') { activeDiv.innerHTML += cardHtml; hasActive = true; }
            });

            if (!hasPending) pendingDiv.innerHTML = "<p style='color: #64748b;'>No pending applications at this time.</p>";
            if (!hasActive) activeDiv.innerHTML = "<p style='color: #64748b;'>No active guards in the roster.</p>";
        }

        // --- ADMIN ACTIONS ---
        async function updateStatus(id, newStatus) {
            await supabaseClient.from('guards').update({ status: newStatus }).eq('id', id);
            fetchData();
        }

        async function deleteRecord(id) {
            if(confirm("Are you sure you want to permanently remove this record?")) {
                await supabaseClient.from('guards').delete().eq('id', id);
                fetchData();
            }
        }

        async function editRecord(id, currentName, currentDate) {
            const newName = prompt("Edit Name:", currentName);
            if (newName === null) return; 
            
            const newDate = prompt("Edit Expiration Date (YYYY-MM-DD):", currentDate);
            if (newDate === null) return;

            const { error } = await supabaseClient.from('guards').update({ 
                name: newName, 
                expiration_date: newDate 
            }).eq('id', id);

            if (error) alert("Error updating record.");
            else fetchData();
        }
    </script>
</body>
</html>
