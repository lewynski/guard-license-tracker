<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Registration | Aegis Security</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a; /* Navy Blue */
            --accent-color: #2563eb; /* Bright Blue */
            --bg-color: #f8fafc; /* Light Gray */
            --text-color: #334155;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }
        /* Navbar Styling */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .logo span { color: var(--accent-color); }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: white; }
        
        /* Main Content Styling */
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        p.subtitle { color: #64748b; font-size: 0.95em; margin-bottom: 25px; }
        
        /* Form Styling */
        label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--primary-color); }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 6px; 
            border: 1px solid #cbd5e1; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .btn-submit { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%;
            border-radius: 6px;
            cursor: pointer; 
            font-weight: 600; 
            font-size: 1em;
            transition: background 0.3s;
        }
        .btn-submit:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Aegis <span>Security Solutions</span></div>
        <div class="nav-links">
            <a href="index.html">Portal Home</a>
            <a href="admin.html">Admin Dashboard</a>
        </div>
    </header>

    <div class="container">
        <h2>Personnel Registration</h2>
        <p class="subtitle">Please enter the security personnel's credentials into the centralized database.</p>
        
        <form id="guardForm">
            <label>Full Legal Name</label>
            <input type="text" id="name" placeholder="e.g., Juan Dela Cruz" required>

            <label>License Number</label>
            <input type="text" id="license_number" placeholder="Enter license ID" required>

            <label>Contact Email</label>
            <input type="email" id="email" placeholder="guard@example.com" required>

            <label>License Expiration Date</label>
            <input type="date" id="expiration_date" required>

            <button type="submit" class="btn-submit">Submit Record</button>
        </form>
    </div>

    <script>
        // 1. Initialize Supabase 
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Save Data to Supabase
        document.getElementById('guardForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.innerText = "Processing...";

            const name = document.getElementById('name').value;
            const license_number = document.getElementById('license_number').value;
            const email = document.getElementById('email').value;
            const expiration_date = document.getElementById('expiration_date').value;

            const { data, error } = await supabaseClient.from('guards').insert([
                { name: name, license_number: license_number, email: email, expiration_date: expiration_date }
            ]);

            if (error) {
                alert("System Error: " + error.message);
                console.error(error);
                submitBtn.innerText = "Submit Record";
            } else {
                alert("Success: Personnel record securely registered.");
                document.getElementById('guardForm').reset(); 
                submitBtn.innerText = "Submit Record";
            }
        });
    </script>
</body>
</html>
