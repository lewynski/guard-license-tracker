<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Roster | Aegis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #16a34a; --bg: #f8fafc; --text: #334155; --light-green-bg: #e0f2f1;}
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; max-width: 1000px; margin: 0 auto; }
        h2 { color: var(--primary); text-align: center; font-size: 2em; margin-bottom: 40px; margin-top: 0;}
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: 'Inter'; }
        .roster-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 15px; background: #fff; border-radius: 5px; margin-bottom: 10px; }
        .roster-item:hover { background: var(--light-green-bg); }
        .urgent { color: #ef4444; font-weight: bold; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; font-weight: bold; }
        
        /* MOBILE RESPONSIVE CSS */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .card { padding: 20px; }
            .controls { flex-direction: column; align-items: stretch; gap: 15px; }
            .controls h3 { margin: 0; text-align: center; }
            .roster-item { flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>
<body onload="loadApprovedGuards()">

    <a href="index.html" class="back-btn">← Back to Home</a>
    
    <div class="card">
        <h2>Active Guard Roster</h2>
        <div class="controls">
            <h3>Active Personnel List</h3>
            <select id="sortOrder" onchange="loadApprovedGuards()">
                <option value="date">Sort by: Expiration Date (Nearest First)</option>
                <option value="name">Sort by: Name (A-Z)</option>
            </select>
        </div>
        <div id="roster-container">Fetching live records...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tojcimhuslpbpkmkvvsz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvamNpbWh1c2xwYnBrbWt2dnN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDg0MDcsImV4cCI6MjA4ODY4NDQwN30.rmatxYCKks8CKhdtesRwrITx06he4-AjgmLhlsEFzxo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadApprovedGuards() {
            const container = document.getElementById('roster-container');
            container.innerHTML = "Fetching live records...";

            const { data, error } = await supabaseClient.from('guards').select('*').eq('status', 'approved');
            if (error) { container.innerHTML = "Error loading data."; return; }
            if (data.length === 0) { container.innerHTML = "No active guards found."; return; }

            const sortType = document.getElementById('sortOrder').value;
            data.sort((a, b) => {
                if (sortType === 'date') return new Date(a.expiration_date) - new Date(b.expiration_date);
                if (sortType === 'name') return a.name.localeCompare(b.name);
            });

            container.innerHTML = '';
            data.forEach(guard => {
                const daysUntilExp = (new Date(guard.expiration_date) - new Date()) / (1000 * 60 * 60 * 24);
                const dateClass = daysUntilExp < 30 ? 'urgent' : '';
                container.innerHTML += `
                    <div class="roster-item">
                        <strong>${guard.name}</strong>
                        <span class="${dateClass}">Expires: ${guard.expiration_date}</span>
                    </div>`;
            });
        }
    </script>
</body>
</html>
